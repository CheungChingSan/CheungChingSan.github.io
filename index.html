    else if (h.startsWith('sec=')) { iso2 = h.slice(4); mode = 'sec'; }
    if (!iso2) { hint.className = 'country-hint'; hint.innerHTML = ''; return; }
    const CN = { bd:'孟加拉', cn:'中国', in:'印度', jp:'日本', kr:'韩国', vn:'越南', th:'泰国', my:'马来西亚', sg:'新加坡', id:'印度尼西亚', ph:'菲律宾', pk:'巴基斯坦', lk:'斯里兰卡', mm:'缅甸', kh:'柬埔寨', la:'老挝', np:'尼泊尔', mn:'蒙古', kz:'哈萨克斯坦', uz:'乌兹别克斯坦', ir:'伊朗', iq:'伊拉克', sa:'沙特阿拉伯', ae:'阿联酋', tr:'土耳其', eg:'埃及', za:'南非', ng:'尼日利亚', br:'巴西', ar:'阿根廷', cl:'智利', pe:'秘鲁', mx:'墨西哥', us:'美国', ca:'加拿大', fr:'法国', de:'德国', it:'意大利', es:'西班牙', pt:'葡萄牙', nl:'荷兰', be:'比利时', ch:'瑞士', at:'奥地利', se:'瑞典', no:'挪威', dk:'丹麦', fi:'芬兰', ie:'爱尔兰', gb:'英国', pl:'波兰', ru:'俄罗斯', ua:'乌克兰', au:'澳大利亚', nz:'新西兰' };
    const label = CN[iso2] || iso2.toUpperCase();
    if (mode === 'sec') hint.innerHTML = '已定位板块：<b>'+label+'</b> 客户文件';
    else hint.innerHTML = '正在建设：<b>'+label+'</b> 国家专属板块（即将上线）';
    hint.className = 'country-hint show';
  }

  function enterApp(){
    $('login').style.display='none';
    $('app').style.display='block';
    $('who').textContent = ME.username;
    $('roleTag').textContent = ME.label || roleLabel(ME.role, ME.username);
    renderSections();
    showCountryHint();
  }

  function renderSections(){
    const cats = $('cats');
    cats.innerHTML = '';
    const role = ME.role;
    // 基础资料版块：按 SECTION_ACCESS 过滤
    CATS.forEach(c => {
      if (!(SECTION_ACCESS[c.id] || []).includes(role)) return;
      if (c.tree){ cats.appendChild(catTreeBlock(c, c.tree)); return; }   // 外贸客户：分级导航
      const items = BASE_META.filter(s => s.cat === c.id);
      if (!items.length) return;
      cats.appendChild(catBlock(c, items, (s)=>('./base/'+s.file), 'base'));
    });
    // 全员上传版块：公共版块，所有角色可见；VIP/管理员看全部上传，其余只看本人
    if ((SECTION_ACCESS['uploads'] || []).includes(role)) {
      const mine = (role === 'admin' || role === 'vip')
        ? UPLOADS
        : UPLOADS.filter(s => s.owner === ME.username);
      if (mine.length) cats.appendChild(catBlock({id:'mine', name:'全员上传板块', color:'#0d9488'}, mine, (s)=>('./'+s.file), 'user', true));
      else if (role !== 'admin' && role !== 'vip') cats.appendChild(emptyBlock('你还没有上传文件（静态版不支持上传，请使用本地后端版本）。'));
    }
  }
  function catBlock(c, items, getUrl, kind, showOwner){
    const sec = document.createElement('section'); sec.className='cat';
    const head = document.createElement('div'); head.className='cat-head';
    head.innerHTML = '<span class="dot" style="background:'+c.color+'"></span><h2>'+c.name+'</h2><span class="cnt">'+items.length+' 份</span>';
    sec.appendChild(head);
    const grid = document.createElement('div'); grid.className='grid';
    items.forEach(s => {
      const card = document.createElement('div'); card.className='card '+(kind==='base'?c.id:'mine');
      const sub = showOwner ? ('上传者：'+s.owner) : '';
      card.innerHTML = '<span class="t"></span>'+(sub?'<span class="sub">'+sub+'</span>':'')+'<span class="go">打开 ↗</span>';
      card.querySelector('.t').textContent = s.title;
      card.addEventListener('click', () => openSection(getUrl(s)));
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    return sec;
  }
  function emptyBlock(msg){
    const d = document.createElement('div'); d.className='empty'; d.textContent = msg; return d;
  }
  // 外贸客户分级导航：一级[外贸客户文件] → 二级大洲 → 三级国家；
  // 有客户文件子链接的国家（如孟加拉）点击展开「客户信息」子链接面板；无文件国家点击直接打开该国主页
  function catTreeBlock(c, tree){
    const sec = document.createElement('section'); sec.className='cat';
    const head = document.createElement('div'); head.className='cat-head';
    head.innerHTML = '<span class="dot" style="background:'+c.color+'"></span><h2>'+c.name+'</h2>';
    sec.appendChild(head);
    const treeBox = document.createElement('div'); treeBox.className='cust-tree';
    const g1 = document.createElement('div'); g1.className='cust-g1'; g1.textContent = tree.name;
    treeBox.appendChild(g1);
    tree.regions.forEach(reg => {
      const rg = document.createElement('div'); rg.className='cust-region';
      const rh = document.createElement('div'); rh.className='cust-region-h'; rh.textContent = reg.name;
      rg.appendChild(rh);
      const grid = document.createElement('div'); grid.className='grid cust-grid';
      reg.countries.forEach(co => {
        const files = (CUST_FILES && CUST_FILES[co.iso2]) || co.files || null;
        // 重点国家（孟加拉 / 尼日利亚）标黄高亮
        const HOT = { bd:true, ng:true };
        const hot = !!HOT[co.iso2];
        const card = document.createElement('div'); card.className='card cust'+(hot?' hot':'');
        card.innerHTML = '<span class="t"></span>'+(hot?'<span class="badge">★ 重点</span>':'')+'<span class="go">'+(files && files.length ? '客户信息 ▾' : '客户信息 ↗')+'</span>';
        card.querySelector('.t').textContent = co.name;
        grid.appendChild(card);

        if (files && files.length){
          // 展开子链接面板（子链接：逐份客户文件）
          const sub = document.createElement('div'); sub.className='cust-sub'; sub.style.display='none';
          const subGrid = document.createElement('div'); subGrid.className='grid cust-grid';
          files.forEach(f => {
            const fc = document.createElement('a'); fc.className='card cust sub-card'; fc.href='./base/'+f.file;
            fc.innerHTML = '<span class="t"></span><span class="go">打开 ↗</span>';
            fc.querySelector('.t').textContent = f.title;
            fc.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); openSection('./base/'+f.file); });
            subGrid.appendChild(fc);
          });
          sub.appendChild(subGrid);
          grid.appendChild(sub);
          card.addEventListener('click', () => {
            sub.style.display = (sub.style.display === 'none') ? 'block' : 'none';
            const go = card.querySelector('.go'); if (go) go.textContent = (sub.style.display === 'none') ? '客户信息 ▾' : '客户信息 ▴';
          });
        } else {
          // 无客户文件：点击直接打开该国客户信息主页
          card.addEventListener('click', () => openSection('./country.html?c='+co.iso2));
        }
      });
      rg.appendChild(grid);
      treeBox.appendChild(rg);
    });
    sec.appendChild(treeBox);
    return sec;
  }

  async function openSection(url){
    try{
      // 移动端兼容：直接用真实相对地址载入 iframe，避免 blob: URL 在移动端 iframe / 新标签页中不被支持导致白屏
      curUrl = url;
      $('modalTitle').textContent = '资料预览';
      $('modalFrame').src = url;
      $('modal').style.display = 'flex';
    }catch(_){ alert('打开失败：无法读取文件'); }
  }
  $('modalClose').onclick = () => { $('modal').style.display='none'; $('modalFrame').src='about:blank'; };
  $('modalOpen').onclick = () => { if (curUrl) window.open(curUrl,'_blank'); };

  function logout(){ ME=null; localStorage.removeItem('xh_static_user'); try{ localStorage.removeItem('gate_ok'); localStorage.removeItem('gate_user'); localStorage.removeItem('xh_auth'); }catch(e){} location.reload(); }
  $('btnLogout').onclick = logout;

  // 启动：统一令牌 xh_auth（未登录时 <head> 中 bootstrap 已重定向至 login.html）
  (async () => {
    try{
      const a = JSON.parse(localStorage.getItem('xh_auth')||'null');
      if (a && a.u && (Date.now()-a.ts) < 8*60*60*1000){
        ME = { username:a.u, role: a.role || 'user', label: a.label || roleLabel(a.role, a.u) };
        enterApp();
        return;
      }
    }catch(_){}
    // 无有效令牌：bootstrap 已跳转登录页；此处为兜底，理论上不会到达
  })();

</script>
</body>
</html>
